<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vem ouvi - Favoritos</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <link rel="stylesheet" href="styles/style.css" />
    <script defer src="js/scripts.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html" aria-label="Vem ouvi - Inicio">
          <div class="brand-mark" aria-hidden="true">VO</div>
          <div class="brand-name">Vem ouvi</div>
        </a>

        <button
          class="menu-toggle"
          id="menu-toggle"
          type="button"
          aria-label="Abrir menu"
        >
          Menu
        </button>

        <nav class="nav" id="nav-menu" aria-label="Navegacao principal">
          <a class="nav-link" href="index.html">Inicio</a>
          <a class="nav-link" href="favorites.html">
            Favoritos <span class="badge" id="favorites-count">0</span>
          </a>
          <a class="nav-link" href="login.html">Entrar</a>
          <a class="nav-link" href="register.html">Criar conta</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="panel">
        <h1 class="hero-title" style="font-size: 30px; margin-top: 0">
          Seus favoritos
        </h1>
        <p class="hero-sub" style="margin-bottom: 18px">
          Nesta pagina, os favoritos sao guardados no navegador para fins de
          demonstracao.
        </p>

        <div class="section-title">Lista</div>
        <div id="favorites-list" class="grid" aria-live="polite"></div>

        <div
          style="margin-top: 18px; display: flex; gap: 10px; flex-wrap: wrap"
        >
          <a class="btn btn-secondary" href="index.html">Voltar ao inicio</a>
          <button
            class="btn btn-danger"
            type="button"
            onclick="
              (() => {
                localStorage.removeItem('vem-ouvi-favorites');
                location.reload();
              })()
            "
            aria-label="Limpar favoritos"
          >
            Limpar favoritos
          </button>
        </div>
      </section>
    </main>

    <footer>
      <div class="container footer-inner">
        <div>Copyright <span id="year"></span> Noticias Ao</div>
        <div style="text-align: right">Projeto Web - Grupo 8</div>
      </div>
    </footer>
    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
